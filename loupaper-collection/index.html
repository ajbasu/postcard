<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LouPaper Collection - redteapost</title>
    <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="../assets/style.css">
    <link rel="stylesheet" type="text/css" href="../assets/tracker.css">
    <meta name="description"
        content="Personal collection of LouPaper US 50 States postcards by Louise Neumann through an interactive map.">

    <!-- Twitter Card meta tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LouPaper Collection by redteapost">
    <meta property="twitter:domain" content="ajbasu.github.io">
    <meta name="twitter:description"
        content="Personal collection of LouPaper US 50 States postcards by Louise Neumann through an interactive map.">
    <meta name="twitter:image" content="https://eu.zonerama.com/photos/529208389_1200x630.jpg">
    <meta property="twitter:url" content="https://ajbasu.github.io/postcard/loupaper-collection/">

    <link rel="canonical" href="https://ajbasu.github.io/postcard/loupaper-collection/" />
    <script>
        window.pageTitle = "LouPaper Collection";
    </script>

    <style>
        .series-block {
            margin-bottom: 40px;
        }

        .series-title {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .series-subtitle {
            font-size: 13px;
            color: gray;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
        }

        .image-item {
            position: relative;
            text-align: center;
        }

        .image-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: #eee;
            border-radius: 6px;
            border: 1px solid var(--border-kalar);
        }

        .greyed {
            opacity: 0.3;
        }

        .tag {
            position: absolute;
            top: 4px;
            left: 4px;
            background: black;
            color: white;
            font-size: 10px;
            padding: 2px 4px;
        }

        .name {
            font-size: 12px;
        }

        #galleryContainer {
            padding: 10px;
            /* background: black; */
        }

        .selectContainer {
            display: flex;
            justify-content: flex-end;
            margin: 10px;
            position: absolute;
            right: 0;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div id="header-container"></div>

    <div class="selectContainer">
        <select id="filterSelect">
            <option value="all">All</option>
            <option value="received">Received</option>
            <option value="missing">Not Received</option>
        </select>
    </div>

    <div id="galleryContainer"></div>

    <script src="loupaper.js"></script>
    <script src="../scripts/loadHeader.js"></script>

</body>

</html>
